<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backup Bee Face Recognition Interface</title>
  <style>
    :root { color-scheme: dark; --bg:#07101f; --line:#31415f; --gold:#ffd057; --text:#eef5ff; --muted:#a9b8d2; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:Segoe UI,Arial,sans-serif; }
    header { min-height:76px; display:flex; align-items:center; justify-content:space-between; gap:18px; padding:16px 24px; border-bottom:1px solid var(--line); background:#0b1324; }
    h1 { margin:0; color:var(--gold); font-size:28px; }
    p { margin:4px 0 0; color:var(--muted); }
    a { color:var(--gold); font-weight:800; }
    iframe { display:block; width:100%; height:calc(100vh - 76px); border:0; background:#050a14; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Backup old project interface</h1>
      <p>Reserved interface placeholder. Live bridges are disabled until explicitly approved.</p>
    </div>
    <a href="../">Main site</a>
  </header>
  <iframe
    title="Backup Hive interface"
    srcdoc="<div style='font-family:Segoe UI,Arial,sans-serif;background:#07101e;color:#eef5ff;min-height:100%;padding:32px'><h1 style='color:#ffd052'>Backup bridge disabled</h1><p>The old live Hive/Gradio bridge is not loaded for safety.</p></div>"
    referrerpolicy="no-referrer">
  </iframe>
</body>
</html>
